<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Grid -->
  <defs>
    <marker id="arrowhead1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196F3"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="20" y1="180" x2="180" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="20" y1="180" x2="20" y2="20" stroke="#333" stroke-width="2"/>
  
  <!-- Grid lines -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="60" y1="180" x2="60" y2="20"/>
    <line x1="100" y1="180" x2="100" y2="20"/>
    <line x1="140" y1="180" x2="140" y2="20"/>
    <line x1="20" y1="140" x2="180" y2="140"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="20" y1="60" x2="180" y2="60"/>
  </g>
  
  <!-- Axis labels -->
  <text x="60" y="195" text-anchor="middle" font-size="12">1</text>
  <text x="100" y="195" text-anchor="middle" font-size="12">2</text>
  <text x="140" y="195" text-anchor="middle" font-size="12">3</text>
  <text x="10" y="144" text-anchor="middle" font-size="12">1</text>
  <text x="10" y="104" text-anchor="middle" font-size="12">2</text>
  <text x="10" y="64" text-anchor="middle" font-size="12">3</text>
  <text x="185" y="185" font-size="12">x</text>
  <text x="25" y="15" font-size="12">y</text>
  
  <!-- Vector a = (3, 2) -->
  <line x1="20" y1="180" x2="140" y2="100" stroke="#2196F3" stroke-width="3" marker-end="url(#arrowhead1)"/>
  
  <!-- Label -->
  <text x="90" y="125" font-size="14" fill="#2196F3" font-weight="bold">a⃗ (3,2)</text>
</svg>
