<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196F3"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F44336"/>
    </marker>
  </defs>
  
  <!-- Axes -->
  <line x1="30" y1="220" x2="280" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="30" y1="220" x2="30" y2="20" stroke="#333" stroke-width="2"/>
  
  <!-- Grid lines -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="70" y1="220" x2="70" y2="20"/>
    <line x1="110" y1="220" x2="110" y2="20"/>
    <line x1="150" y1="220" x2="150" y2="20"/>
    <line x1="190" y1="220" x2="190" y2="20"/>
    <line x1="230" y1="220" x2="230" y2="20"/>
    <line x1="270" y1="220" x2="270" y2="20"/>
    <line x1="30" y1="180" x2="280" y2="180"/>
    <line x1="30" y1="140" x2="280" y2="140"/>
    <line x1="30" y1="100" x2="280" y2="100"/>
    <line x1="30" y1="60" x2="280" y2="60"/>
  </g>
  
  <!-- Axis labels -->
  <text x="70" y="235" text-anchor="middle" font-size="11">1</text>
  <text x="110" y="235" text-anchor="middle" font-size="11">2</text>
  <text x="150" y="235" text-anchor="middle" font-size="11">3</text>
  <text x="190" y="235" text-anchor="middle" font-size="11">4</text>
  <text x="230" y="235" text-anchor="middle" font-size="11">5</text>
  <text x="270" y="235" text-anchor="middle" font-size="11">6</text>
  <text x="18" y="184" text-anchor="middle" font-size="11">1</text>
  <text x="18" y="144" text-anchor="middle" font-size="11">2</text>
  <text x="18" y="104" text-anchor="middle" font-size="11">3</text>
  <text x="18" y="64" text-anchor="middle" font-size="11">4</text>
  <text x="285" y="225" font-size="12">x</text>
  <text x="35" y="15" font-size="12">y</text>
  
  <!-- Vector (4,1) - blue -->
  <line x1="30" y1="220" x2="190" y2="180" stroke="#2196F3" stroke-width="3" marker-end="url(#arrow-blue)"/>
  
  <!-- Vector (2,3) starting from (4,1) - green -->
  <line x1="190" y1="180" x2="270" y2="60" stroke="#4CAF50" stroke-width="3" marker-end="url(#arrow-green)"/>
  
  <!-- Result vector (6,4) - red dashed -->
  <line x1="30" y1="220" x2="270" y2="60" stroke="#F44336" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow-red)"/>
  
  <!-- Labels -->
  <text x="100" y="210" font-size="12" fill="#2196F3" font-weight="bold">(4,1)</text>
  <text x="240" y="130" font-size="12" fill="#4CAF50" font-weight="bold">(2,3)</text>
  <text x="140" y="120" font-size="12" fill="#F44336" font-weight="bold">(6,4)</text>
</svg>
